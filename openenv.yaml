name: claimwatch
version: "1.0.0"
domain: healthcare
tags: [healthcare, insurance, claims-triage, fraud-detection, urgency-detection]
observation_type: structured_json
action_type: structured_json
reward_range: [-1.0, 1.0]
tasks:
  - {id: 1, name: routine_triage,         difficulty: easy,   n_claims: 30}
  - {id: 2, name: multi_hospital_triage,  difficulty: medium, n_claims: 50}
  - {id: 3, name: full_complexity,        difficulty: hard,   n_claims: 100}
api:
  reset: {method: POST, path: /reset}
  step:  {method: POST, path: /step}
  state: {method: GET,  path: /state}
  tasks: {method: GET,  path: /tasks}
